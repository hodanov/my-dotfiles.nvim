name: Test ai-bridge
permissions:
  contents: read

on:
  pull_request:
    paths:
      - "scripts/ai-bridge/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scripts/ai-bridge
    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: scripts/ai-bridge/go.mod

      - name: Run tests
        run: go test ./... -v -count=1
