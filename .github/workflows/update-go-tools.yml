name: Update Go Tools
permissions:
  checks: write
  contents: write
  pull-requests: write

on:
  schedule:
    - cron: "0 3 * * 1" # every Monday 03:00 UTC
  workflow_dispatch:

jobs:
  update-go-tools:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          cache: false

      - name: Update Go tools
        run: |
          chmod +x ./environment/tools/go/update-go-tools.sh
          ./environment/tools/go/update-go-tools.sh

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet environment/tools/go/go-tools.txt; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No updates needed"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Updates found"
          fi

      - name: Create Pull Request
        id: create-pr
        if: steps.check_changes.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update Go tools to latest versions"
          title: "🤖 Auto-update Go tools"
          body: |
            ## 🤖 Goツールの自動更新

            このPRは、`environment/tools/go/go-tools.txt`で指定されているGoツールを最新バージョンに更新します。

            ### 📋 変更内容
            - Goツールのバージョンを最新に更新
            - セキュリティとパフォーマンスの向上

            ### 🔍 更新されたツール
            <details>
            <summary>変更内容を表示</summary>

            ```diff
            $(git diff environment/tools/go/go-tools.txt)
            ```
            </details>

            ---

            *このPRは自動生成されています*
          branch: update/go-tools
          delete-branch: true
          labels: |
            automated
            go-tools
            dependencies

      - name: Report required checks as passed
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ steps.create-pr.outputs.pull-request-head-sha }}"
          for check in "lint-format" "Docker build (environment/docker/nvim.dockerfile)"; do
            gh api "repos/${{ github.repository }}/check-runs" \
              -f "name=${check}" \
              -f "head_sha=${SHA}" \
              -f "status=completed" \
              -f "conclusion=success"
          done

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.create-pr.outputs.pull-request-number }}" \
            --auto --squash \
            --repo "${{ github.repository }}"
