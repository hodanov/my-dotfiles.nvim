name: Build nvim image on dependency PRs
permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-docker-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Docker build (environment/docker/nvim.dockerfile)
    if: |
      contains(toJson(github.event.pull_request.labels), 'dependencies') ||
      github.actor == 'dependabot[bot]' ||
      startsWith((github.head_ref || ''), 'chore/bump-tool-versions')
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      DOCKER_BUILDKIT: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build image
        run: |
          docker build \
            --file environment/docker/nvim.dockerfile \
            --progress=plain \
            .
