version: 2
updates:
  - package-ecosystem: "pip"
    directory: "./environment/tools/python"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14
    groups:
      pip-dependencies:
        patterns:
          - "*"
  - package-ecosystem: "npm"
    directory: "./environment/tools/node"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14
    groups:
      npm-tools:
        patterns:
          - "*"
  - package-ecosystem: "docker"
    directory: "./environment/docker"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14
    groups:
      docker-dependencies:
        patterns:
          - "*"
  - package-ecosystem: "gomod"
    directory: "./scripts/ai-bridge"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14
    groups:
      go-dependencies:
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 14
    groups:
      workflow-dependencies:
        patterns:
          - "*"
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14
